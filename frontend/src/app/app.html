@if (authService.isLoggedIn()) {
  <div class="app-layout">
    <!-- Navbar -->
    <header class="app-navbar">
      <div class="logo">TraceBack</div>
      <div class="user-info">
        <span class="user-details">{{ authService.currentUser()?.name }} ({{ authService.currentUser()?.email }})</span>
        <button (click)="logout()" class="btn-logout-small">Logout</button>
      </div>
    </header>

    <div class="app-body">
      <!-- Sidebar -->
      <aside class="app-sidebar">
        <nav>
          <ul>
            <li><a routerLink="/dashboard" routerLinkActive="active">Dashboard</a></li>
            <li><a routerLink="/my-items" routerLinkActive="active">My Items</a></li>
            <li><a routerLink="/post-item" routerLinkActive="active">Post Item</a></li>
            <li><a routerLink="/claims" routerLinkActive="active">Claim Requests</a></li>
            <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content Area -->
      <main class="app-content">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
} @else {
  <router-outlet></router-outlet>
}
