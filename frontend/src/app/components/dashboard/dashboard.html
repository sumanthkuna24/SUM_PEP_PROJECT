<div class="dashboard-page">
  <div class="dashboard-header">
    <h1>Welcome back, {{ authService.currentUser()?.name }}!</h1>
    <p class="dashboard-desc">From here, you will manage all your lost and found activities on campus.</p>
  </div>

  <div class="metrics-grid">
    <div class="metric-card">
      <h3>Total Posts</h3>
      <p class="metric-value">0</p>
      <span class="metric-subtitle">All reported items</span>
    </div>

    <div class="metric-card">
      <h3>Open Items</h3>
      <p class="metric-value text-primary">0</p>
      <span class="metric-subtitle">Currently active</span>
    </div>

    <div class="metric-card">
      <h3>Matched Items</h3>
      <p class="metric-value text-warning">0</p>
      <span class="metric-subtitle">Auto-detected matches</span>
    </div>

    <div class="metric-card">
      <h3>Resolved Items</h3>
      <p class="metric-value text-success">0</p>
      <span class="metric-subtitle">Items successfully returned</span>
    </div>
  </div>
</div>
